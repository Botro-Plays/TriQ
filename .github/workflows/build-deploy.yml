name: Build & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate -w apps/server

      - name: Build Server
        run: npm run build -w apps/server

      - name: Commit dist to deploy branch
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -B deploy
          # Add built files forcefully (dist is normally gitignored)
          git add apps/server/dist -f
          # Also add generated prisma client if needed for standalone run
          git add node_modules/.prisma -f 2>/dev/null || true
          git commit -m "deploy: $(date -u +%Y-%m-%d_%H:%M:%S) UTC" || echo "No changes"
          git push origin deploy --force
