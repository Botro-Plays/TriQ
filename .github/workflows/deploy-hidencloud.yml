name: Build for HidenCloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate -w apps/server

      - name: Build Server
        run: npm run build -w apps/server

      - name: Package for HidenCloud
        run: |
          mkdir -p hidencloud-deploy
          # Server compiled output
          cp -r apps/server/dist hidencloud-deploy/
          # Prisma schema + migrations (for migrate deploy on startup or manually)
          cp -r apps/server/prisma hidencloud-deploy/
          # Package metadata
          cp apps/server/package.json hidencloud-deploy/
          # Root node_modules (contains all dependencies from npm ci)
          cp -r node_modules hidencloud-deploy/
          # Create a minimal .env.example for reference
          cat > hidencloud-deploy/.env.example << 'EOF'
          NODE_ENV=production
          PORT=4000
          DATABASE_URL=postgresql://user:pass@host:5432/triq
          JWT_SECRET=your-jwt-secret-min-32-chars
          WEB_APP_URL=https://your-frontend-url.com
          FIREBASE_PROJECT_ID=your-project-id
          FIREBASE_CLIENT_EMAIL=your-service-account@project.iam.gserviceaccount.com
          FIREBASE_PRIVATE_KEY="-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----"
          EOF
          # Zip it
          cd hidencloud-deploy && zip -r ../hidencloud-deploy.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hidencloud-deploy
          path: hidencloud-deploy.zip
          retention-days: 5
