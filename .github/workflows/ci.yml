name: CI Build Check

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate -w apps/server

      - name: Build Web
        env:
          NODE_ENV: production
        run: npm run build -w apps/web

      - name: Build Server
        run: npm run build -w apps/server

      - name: Verify builds succeeded
        run: |
          test -f apps/web/dist/index.html && echo "Web build OK"
          test -f apps/server/dist/index.js && echo "Server build OK"
