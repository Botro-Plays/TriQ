name: Build + Migrate + Commit Dist

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-commit:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate -w apps/server

      - name: Deploy database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd apps/server
          npx prisma migrate deploy || echo "Migration deploy failed, continuing..."

      - name: Build Web
        env:
          NODE_ENV: production
        run: npm run build -w apps/web

      - name: Build Server
        run: npm run build -w apps/server

      - name: Commit built dist files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add apps/web/dist apps/server/dist
          git diff --cached --quiet || git commit -m "chore(build): production dist [skip ci]"
          git push
