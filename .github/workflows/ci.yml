name: CI + Build + Migrate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate -w apps/server

      - name: Lint Server
        run: npm run lint -w apps/server
        continue-on-error: true

      - name: Lint Web
        run: npm run lint -w apps/web
        continue-on-error: true

      - name: Test Server
        run: npm run test -w apps/server
        continue-on-error: true

      - name: Test Web
        run: npm run test -w apps/web
        continue-on-error: true

  build-and-migrate:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate -w apps/server

      - name: Deploy database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd apps/server
          npx prisma migrate deploy || echo "Migration deploy failed, continuing..."

      - name: Build Web
        env:
          NODE_ENV: production
        run: npm run build -w apps/web

      - name: Build Server
        run: npm run build -w apps/server

      - name: Commit built dist files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/dist apps/server/dist
          git diff --cached --quiet || git commit -m "chore(build): production dist [skip ci]"
          git push
