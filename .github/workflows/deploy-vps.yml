name: CI + Deploy to VPS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate -w apps/server

      - name: Build Server
        run: npm run build -w apps/server

      - name: Build Web
        run: npm run build -w apps/web

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate -w apps/server

      - name: Build Server
        run: npm run build -w apps/server

      - name: Build Web
        run: npm run build -w apps/web

      - name: Install production deps for server
        run: |
          cd apps/server
          npm install --production --omit=dev

      - name: Copy Prisma Client into server package
        run: |
          # prisma generate writes to root node_modules/.prisma/client (monorepo)
          # copy it into apps/server/node_modules/.prisma/client so tarball includes it
          mkdir -p apps/server/node_modules/.prisma/client
          cp -r node_modules/.prisma/client/* apps/server/node_modules/.prisma/client/

      - name: Package frontend
        run: |
          cd apps/web
          tar -czf ../../deploy-web.tar.gz dist/

      - name: Package backend
        run: |
          cd apps/server
          tar -czf ../../deploy-server.tar.gz dist/ prisma/ package.json node_modules/ prisma/migrations/

      - name: Upload packages to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy-web.tar.gz,deploy-server.tar.gz"
          target: "/tmp"

      - name: Deploy and restart on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Deploy frontend (strip dist/ prefix)
            rm -rf /var/www/triq/*
            tar -xzf /tmp/deploy-web.tar.gz -C /var/www/triq --strip-components=1

            # Deploy backend (preserve config/ and .env)
            cd /var/www/triq-server
            rm -rf dist prisma package.json node_modules package-lock.json
            tar -xzf /tmp/deploy-server.tar.gz -C /var/www/triq-server

            # VPS is ready-to-go — just migrate DB and seed
            cd /var/www/triq-server
            ./node_modules/.bin/prisma migrate deploy
            ./node_modules/.bin/prisma db seed

            # Start/restart PM2
            pm2 delete triq-server || true
            pm2 start dist/index.js --name triq-server --update-env
            pm2 save --force

            # Cleanup
            rm -f /tmp/deploy-web.tar.gz /tmp/deploy-server.tar.gz
            echo "Full stack deployed successfully"
